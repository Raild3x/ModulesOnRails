[package]
name = "raild3x/tablemanager"
description = "A Luau library for managing tables."
authors = ["Logan Hunt (Raildex)"]
version = "1.0.2"
license = "MIT"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

[custom]
# The properly capitalized and spaced name of the library
formattedName = "TableManager"
# The intro page for the documentation
docsLink = "TableManager"

[dependencies]
T = "raild3x/t@^1"
Signal = "howmanysmall/better-signal@2.1.0"
Janitor = "howmanysmall/janitor@^1.16.0"
Promise = "howmanysmall/typed-promise@^4.0.6"