[package]
name = "raild3x/playerdatamanager"
description = "A class for managing player profiles."
authors = ["Logan Hunt (Raildex)"]
version = "0.1.2"
license = "MIT"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

[custom]
# The properly capitalized and spaced name of the library
formattedName = "PlayerDataManager"
# The intro page for the documentation
docsLink = "PlayerDataManager"

unreleased = true

[dependencies]
T = "raild3x/t@^1"
Signal = "howmanysmall/better-signal@2.1.0"
Promise = "howmanysmall/typed-promise@^4.0.3"
Janitor = "howmanysmall/janitor@^1.18"
TableReplicator = "raild3x/tablereplicator@^0"
TableManager = "raild3x/tablemanager@^0"
RailUtil = "raild3x/railutil@^1"