[package]
name = "raild3x/dragdrop"
description = "A device-agnostic drag-and-drop system for Roblox UI (mouse, touch, gamepad, keyboard)."
authors = ["Logan Hunt (Raildex)"]
version = "0.1.0"
license = "MIT"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

[custom]
# The properly capitalized and spaced name of the library
formattedName = "DragDrop"
# The intro page for the documentation
docsLink = "DragDrop"

[dependencies]
Signal = "howmanysmall/better-signal@2.1.0"
Janitor = "howmanysmall/janitor@^1.16.0"
