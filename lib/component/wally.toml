[package]
name = "raild3x/component"
description = "A fork of Sleitnick's Component class for Roblox."
authors = ["Logan Hunt (Raildex)"]
version = "1.0.0"
license = "MIT"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

[custom]
# The properly capitalized and spaced name of the library
formattedName = "Component"
# The intro page for the documentation
docsLink = "Component"
# Whether or not to ignore this package in the readme


[dependencies]
Promise = "howmanysmall/typed-promise@^4.0.6"
Signal = "howmanysmall/better-signal@2.1.0"
Janitor = "howmanysmall/janitor@^1.16.0"
Symbol = "sleitnick/symbol@^2.0.1"