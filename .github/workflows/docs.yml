# Regenerates README.md and deploys the Moonwave documentation site to GitHub Pages.
# Called by the 'Publish Packages' workflow after a successful publish, and can
# also be run manually as a break-glass when docs need rebuilding without a publish.
#
# Always operates on main: the caller may be running in a PR-merge context where
# github.ref_name is not a real branch, and the published docs must reflect main.
name: Docs

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Generate README.md from wally.toml metadata and commit the result.
  generate-readme:
    name: Generate README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run generate_readme.py
        run: python scripts/generate_readme.py

      - name: Commit README update
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md; then
            echo "README.md unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: regenerate README"
          git push origin HEAD:main

  # Build the Moonwave docs site and push the generated output to the gh-pages branch.
  # Must run after generate-readme so moonwave picks up the updated README.
  build:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    needs: generate-readme
    steps:
      # Fetch the branch head, not the workflow trigger SHA, so the README
      # commit from generate-readme is included before moonwave runs.
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm i -g moonwave@latest
      # moonwave's gh-pages publish step clones the repo into its own cache dir
      # (~/.cache/moonwave/...) rather than reusing this checkout, so the
      # credential actions/checkout persists locally in ./.git/config doesn't
      # carry over. Configure it globally so any clone/push in this job authenticates.
      - name: Configure git credentials
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Build and publish docs
        run: |
          set -euo pipefail
          moonwave build --publish
