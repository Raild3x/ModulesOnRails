name: Validate Publish Setup

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Publish Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate package structure
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflow_actions/validate_publish_setup.py --check packages

      - name: Setup Rokit
        uses: raild3x/setup-rokit@v0.1.0

      - name: Verify Wally is available
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking Wally installation..."
          
          if command -v wally >/dev/null 2>&1; then
            wally --version
            echo "✓ wally available in PATH"
            exit 0
          fi

          if [ -x .rokit/bin/wally ]; then
            echo "$PWD/.rokit/bin" >> "$GITHUB_PATH"
            ./.rokit/bin/wally --version
            echo "✓ wally available from .rokit/bin"
            exit 0
          fi

          echo "✗ wally not found"
          exit 1

      - name: Test wally is available and configured
        shell: bash
        run: |
          set -euo pipefail
          echo "Testing wally configuration..."
          
          first_pkg=$(find lib -maxdepth 1 -mindepth 1 -type d | sort | head -n 1)
          if [ -z "$first_pkg" ]; then
            echo "✗ No package directories found"
            exit 1
          fi
          
          pkg_name=$(basename "$first_pkg")
          echo "Testing with package: $pkg_name"
          
          # Verify wally is installed
          wally --version
          
          # Verify package structure for publishing
          echo "Checking package structure required for publishing:"
          if [ ! -f "$first_pkg/wally.toml" ]; then
            echo "✗ $pkg_name is missing wally.toml"
            exit 1
          fi
          echo "✓ wally.toml present"
          
          if [ ! -d "$first_pkg/src" ]; then
            echo "✗ $pkg_name is missing src/ directory"
            exit 1
          fi
          echo "✓ src/ directory present"
          
          # Create default.project.json if missing (required by wally)
          if [ ! -f "$first_pkg/default.project.json" ]; then
            echo "Creating default.project.json for $pkg_name..."
            cat > "$first_pkg/default.project.json" <<EOF
{
    "name": "$pkg_name",
    "tree": {
        "\$path": "src"
    }
}
EOF
            echo "✓ default.project.json created"
          else
            echo "✓ default.project.json already present"
          fi
          
          # Extract and display package name and version
          pkg_full_name=$(grep -E '^\s*name\s*=' "$first_pkg/wally.toml" | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          pkg_version=$(grep -E '^\s*version\s*=' "$first_pkg/wally.toml" | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          
          if [ -n "$pkg_full_name" ] && [ -n "$pkg_version" ]; then
            echo "✓ Package: $pkg_full_name @ $pkg_version"
          else
            echo "✗ Could not parse package info from wally.toml"
            exit 1
          fi
          
          # Test wally functionality with default.project.json in place
          echo "Testing wally with proper project structure..."
          if (cd "$first_pkg" && wally login --help > /dev/null 2>&1); then
            echo "✓ wally is functional"
          else
            echo "⚠ wally may have issues, but the package structure is correct"
          fi

      - name: Verify publish action inputs
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflow_actions/validate_publish_setup.py --check action-inputs

      - name: Verify workflow passes inputs to action
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflow_actions/validate_publish_setup.py --check workflow-inputs

      - name: Resolve detected version type
        if: github.event_name != 'push'
        id: version_preview
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflow_actions/publish_resolve_version_change.py \
            --event-name "${{ github.event_name }}" \
            --event-path "$GITHUB_EVENT_PATH" \
            --dispatch-version-change none

      - name: Detect changed packages for preview
        if: github.event_name != 'push'
        id: changed_preview
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/workflow_actions/publish_detect_changed_packages.py \
            --event-name "${{ github.event_name }}" \
            --event-path "$GITHUB_EVENT_PATH" \
            --repository "${{ github.repository }}" \
            --pr-number "${{ github.event.pull_request.number || 0 }}" \
            --changed-packages-file changed-packages.txt

      - name: Preview package version updates
        if: github.event_name != 'push'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflow_actions/validate_publish_setup.py \
            --check version-preview \
            --version-change "${{ steps.version_preview.outputs.version_change }}" \
            --changed-packages-file changed-packages.txt

      - name: Summary
        shell: bash
        run: |
          echo ""
          echo "✅ Publish setup validation complete!"
          echo ""
          echo "Next steps:"
          echo "  1. Ensure WALLY_TOKEN secret is set in repository settings"
          echo "  2. Create/merge a PR with lib/* changes to trigger publishing"
          echo "  3. Or manually trigger workflow with workflow_dispatch"
