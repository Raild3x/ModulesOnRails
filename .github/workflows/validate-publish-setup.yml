name: Validate Publish Setup

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Publish Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate package structure
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflow_actions/validate_publish_setup.py --check packages

      - name: Setup Rokit
        uses: raild3x/setup-rokit@v0.1.0

      - name: Verify Wally is available
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking Wally installation..."
          
          if command -v wally >/dev/null 2>&1; then
            wally --version
            echo "✓ wally available in PATH"
            exit 0
          fi

          if [ -x .rokit/bin/wally ]; then
            echo "$PWD/.rokit/bin" >> "$GITHUB_PATH"
            ./.rokit/bin/wally --version
            echo "✓ wally available from .rokit/bin"
            exit 0
          fi

          echo "✗ wally not found"
          exit 1

      - name: Test wally login from package directory
        shell: bash
        env:
          WALLY_TOKEN: ${{ secrets.WALLY_TOKEN }}
        run: |
          set -euo pipefail
          echo "Testing wally login flow..."

          if [ -z "${WALLY_TOKEN:-}" ]; then
            echo "✗ WALLY_TOKEN secret is not configured" >&2
            exit 1
          fi
          
          first_pkg=$(find lib -maxdepth 1 -mindepth 1 -type d | sort | head -n 1)
          if [ -z "$first_pkg" ]; then
            echo "✗ No package directories found"
            exit 1
          fi
          
          pkg_name=$(basename "$first_pkg")
          echo "Testing with package: $pkg_name"
          
          # Test that wally.toml can be read from the package directory
          if [ ! -f "$first_pkg/wally.toml" ]; then
            echo "✗ wally.toml not found in $first_pkg"
            exit 1
          fi
          
          # Verify the wally.toml has required package metadata
          if ! grep -q "^\[package\]" "$first_pkg/wally.toml"; then
            echo "✗ Invalid wally.toml format"
            exit 1
          fi
          
          # Check wally version and basic functionality
          echo "Wally version:"
          wally --version
          
          # Actually run wally login with temporary HOME to validate the full flow
          temp_home=$(mktemp -d)
          trap "rm -rf '$temp_home'" EXIT
          
          # Pre-create config directories so wally can write credentials
          mkdir -p "$temp_home/.wally" "$temp_home/.config/wally"
          
          echo "Running wally login from $pkg_name directory..."
          echo "Current directory: $(pwd)"
          echo "Package directory: $first_pkg"
          echo "Files in package directory:"
          ls -la "$first_pkg" | head -20
          
          # Try wally login from package directory, capturing full error output
          if ! (export HOME="$temp_home" && cd "$first_pkg" && wally login --token "$WALLY_TOKEN"); then
            echo "✗ wally login failed from package directory" >&2
            echo "Trying from project root instead..."
            
            # Fallback: try from project root
            if ! (export HOME="$temp_home" && wally login --token "$WALLY_TOKEN"); then
              echo "✗ wally login failed from project root too" >&2
              exit 1
            fi
          fi
          
          # Check if auth config was created
          if [ -f "$temp_home/.wally/credentials.toml" ] || [ -f "$temp_home/.config/wally/credentials.toml" ]; then
            echo "✓ wally login succeeded and created credentials"
          else
            echo "⚠ wally login completed but credentials file was not created (may still be valid)" >&2
          fi

      - name: Verify publish action inputs
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflow_actions/validate_publish_setup.py --check action-inputs

      - name: Verify workflow passes inputs to action
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflow_actions/validate_publish_setup.py --check workflow-inputs

      - name: Resolve detected version type
        if: github.event_name != 'push'
        id: version_preview
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflow_actions/publish_resolve_version_change.py \
            --event-name "${{ github.event_name }}" \
            --event-path "$GITHUB_EVENT_PATH" \
            --dispatch-version-change none

      - name: Detect changed packages for preview
        if: github.event_name != 'push'
        id: changed_preview
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/workflow_actions/publish_detect_changed_packages.py \
            --event-name "${{ github.event_name }}" \
            --event-path "$GITHUB_EVENT_PATH" \
            --repository "${{ github.repository }}" \
            --pr-number "${{ github.event.pull_request.number || 0 }}" \
            --changed-packages-file changed-packages.txt

      - name: Preview package version updates
        if: github.event_name != 'push'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflow_actions/validate_publish_setup.py \
            --check version-preview \
            --version-change "${{ steps.version_preview.outputs.version_change }}" \
            --changed-packages-file changed-packages.txt

      - name: Summary
        shell: bash
        run: |
          echo ""
          echo "✅ Publish setup validation complete!"
          echo ""
          echo "Next steps:"
          echo "  1. Ensure WALLY_TOKEN secret is set in repository settings"
          echo "  2. Create/merge a PR with lib/* changes to trigger publishing"
          echo "  3. Or manually trigger workflow with workflow_dispatch"
